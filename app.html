<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXORA Tasks - To-Do List</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <style>
        :root {
            --color-primary-dark: #050a14;
            --color-deep-blue: #001f3f;
            --color-electric-blue: #0055ff;
            --color-sky-blue: #38bdf8;
            --color-dark-navy: #001a33;
            --color-silver: #e2e8f0;
            --color-accent: #d4af37;
            --color-white: #ffffff;
            --color-black: #0a0a0a;
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--color-primary-dark);
            color: var(--color-silver);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }

        body.lang-ar {
            font-family: 'Cairo', sans-serif;
        }

        body.light-mode {
            background-color: var(--color-white);
            color: var(--color-black);
        }

        /* Navbar */
        nav {
            position: sticky;
            top: 0;
            width: 100%;
            z-index: 50;
            background: rgba(5, 10, 20, 0.95);
            border-bottom: 2px solid var(--color-accent);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        body.light-mode nav {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: var(--color-accent);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-brand-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--color-accent);
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        body.light-mode .nav-brand-text {
            text-shadow: none;
        }

        .nav-logo {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 15px rgba(0, 85, 255, 0.3));
            transition: all 0.3s ease;
        }

        .nav-logo:hover {
            filter: drop-shadow(0 0 25px rgba(212, 175, 55, 0.6));
            transform: scale(1.08);
        }

        .nav-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        body.light-mode .nav-title {
            color: var(--color-deep-blue);
        }

        .nav-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn-toggle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--color-accent);
            background: rgba(212, 175, 55, 0.1);
            color: var(--color-accent);
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-toggle:hover {
            transform: scale(1.15) rotateZ(10deg);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            background: rgba(212, 175, 55, 0.2);
        }

        /* Main Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* Header */
        .app-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        .app-title .highlight {
            color: var(--color-accent);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        body.light-mode .app-title .highlight {
            text-shadow: none;
        }

        .app-subtitle {
            font-size: 1.1rem;
            color: var(--color-sky-blue);
            opacity: 0.9;
        }

        body.light-mode .app-subtitle {
            color: var(--color-deep-blue);
        }

        /* Input Section */
        .input-section {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        .task-input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(0, 34, 68, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--color-silver);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body.light-mode .task-input {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--color-black);
        }

        .task-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            background: rgba(0, 34, 68, 0.5);
        }

        body.light-mode .task-input:focus {
            background: rgba(212, 175, 55, 0.1);
        }

        .task-input::placeholder {
            color: rgba(226, 232, 240, 0.5);
        }

        body.light-mode .task-input::placeholder {
            color: rgba(0, 0, 0, 0.4);
        }

        .priority-select {
            padding: 14px 16px;
            background: rgba(0, 34, 68, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--color-silver);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.light-mode .priority-select {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--color-black);
        }

        .priority-select:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .btn-add {
            padding: 14px 28px;
            background: var(--color-accent);
            color: var(--color-black);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 0.5px;
        }

        .btn-add:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.8);
        }

        .btn-add:active {
            transform: translateY(-2px);
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            gap: 8px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 18px;
            background: rgba(0, 34, 68, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.2);
            color: var(--color-silver);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        body.light-mode .filter-btn {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--color-black);
        }

        .filter-btn:hover {
            border-color: var(--color-accent);
        }

        .filter-btn.active {
            background: var(--color-accent);
            color: var(--color-black);
            border-color: var(--color-accent);
        }

        /* Tasks List */
        .tasks-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(0, 34, 68, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        body.light-mode .task-item {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .task-item:hover {
            border-color: var(--color-accent);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            opacity: 0.7;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: var(--color-accent);
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .task-text {
            font-size: 1.05rem;
            font-weight: 500;
            word-break: break-word;
        }

        body.light-mode .task-text {
            color: var(--color-black);
        }

        .task-meta {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .priority-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .priority-high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .priority-medium {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .priority-low {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .task-date {
            font-size: 0.85rem;
            color: rgba(226, 232, 240, 0.6);
        }

        body.light-mode .task-date {
            color: rgba(0, 0, 0, 0.5);
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: rgba(212, 175, 55, 0.1);
            color: var(--color-accent);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-action:hover {
            background: rgba(212, 175, 55, 0.3);
            transform: scale(1.1);
        }

        .btn-delete {
            color: var(--color-danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--color-sky-blue);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 1.2rem;
            font-weight: 500;
        }

        body.light-mode .empty-state {
            color: var(--color-deep-blue);
        }

        /* Stats */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 2rem;
        }

        .stat-card {
            padding: 16px;
            background: rgba(0, 34, 68, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        body.light-mode .stat-card {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.2);
        }

        .stat-card:hover {
            border-color: var(--color-accent);
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--color-accent);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--color-sky-blue);
            margin-top: 4px;
        }

        body.light-mode .stat-label {
            color: var(--color-deep-blue);
        }

        /* Modal Edit */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--color-primary-dark);
            padding: 2rem;
            border-radius: 15px;
            border: 2px solid var(--color-accent);
            max-width: 500px;
            width: 90%;
            animation: modalSlideIn 0.3s ease;
        }

        body.light-mode .modal-content {
            background: var(--color-white);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--color-accent);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--color-accent);
        }

        .form-input {
            padding: 12px 14px;
            background: rgba(0, 34, 68, 0.3);
            border: 2px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            color: var(--color-silver);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body.light-mode .form-input {
            background: rgba(212, 175, 55, 0.05);
            border-color: rgba(212, 175, 55, 0.3);
            color: var(--color-black);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-accent);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-modal {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .btn-save {
            background: var(--color-accent);
            color: var(--color-black);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .btn-cancel {
            background: rgba(212, 175, 55, 0.1);
            color: var(--color-accent);
            border: 2px solid var(--color-accent);
        }

        .btn-cancel:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-container {
                gap: 1rem;
            }

            .app-title {
                font-size: 1.8rem;
            }

            .input-section {
                grid-template-columns: 1fr;
            }

            .task-item {
                grid-template-columns: auto 1fr auto;
                gap: 12px;
            }

            .filter-section {
                gap: 6px;
            }

            .filter-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }

            .modal-content {
                width: 95%;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }
    </style>
    <!-- Vercel Analytics -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <div class="nav-brand">
                <img src="MAXORA png white.png" alt="MAXORA" class="nav-logo" title="MAXORA">
                <div>
                    <div class="nav-brand-text">MAXORA</div>
                    <div class="nav-title" data-en="Tasks Manager" data-ar="مدير المهام">Tasks Manager</div>
                </div>
            </div>
            <div class="nav-controls">
                <button class="btn-toggle" id="themeToggle" title="Toggle Dark/Light Mode">🌙</button>
                <button class="btn-toggle" id="langToggle" title="Toggle Language">EN</button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <div class="app-header">
            <h1 class="app-title">
                <span data-en="Stay" data-ar="ابقَ">Stay</span>
                <span class="highlight">Productive</span>
                <span data-en="with" data-ar="مع">with</span>
                <span class="highlight">MAXORA</span>
            </h1>
            <p class="app-subtitle" data-en="Organize your tasks and boost productivity" data-ar="نظّم مهامك وعزّز الإنتاجية">Organize your tasks and boost productivity</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label" data-en="Total Tasks" data-ar="إجمالي المهام">Total Tasks</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label" data-en="Completed" data-ar="مكتملة">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingTasks">0</div>
                <div class="stat-label" data-en="Pending" data-ar="قيد الانتظار">Pending</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="highPriorityTasks">0</div>
                <div class="stat-label" data-en="High Priority" data-ar="أولوية عالية">High Priority</div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="أضف مهمة جديدة / Add a new task..."
                    data-placeholder-ar="أضف مهمة جديدة..."
                    data-placeholder-en="Add a new task..."
                >
                <select id="prioritySelect" class="priority-select">
                    <option value="medium" data-en="Medium Priority" data-ar="أولوية عادية">Medium Priority</option>
                    <option value="high" data-en="High Priority" data-ar="أولوية عالية">High Priority</option>
                    <option value="low" data-en="Low Priority" data-ar="أولوية منخفضة">Low Priority</option>
                </select>
            </div>
            <button class="btn-add" id="addBtn" data-en="Add Task" data-ar="إضافة مهمة">Add Task</button>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all" data-en="All" data-ar="الكل">All</button>
            <button class="filter-btn" data-filter="pending" data-en="Pending" data-ar="قيد الانتظار">Pending</button>
            <button class="filter-btn" data-filter="completed" data-en="Completed" data-ar="مكتملة">Completed</button>
            <button class="filter-btn" data-filter="high" data-en="High Priority" data-ar="أولوية عالية">High Priority</button>
        </div>

        <!-- Tasks List -->
        <div class="tasks-container" id="tasksContainer">
            <div class="empty-state">
                <div class="empty-icon">📋</div>
                <div class="empty-text" data-en="No tasks yet. Add one to get started!" data-ar="لا توجد مهام حتى الآن. أضف واحدة للبدء!">No tasks yet. Add one to get started!</div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header" data-en="Edit Task" data-ar="تعديل المهمة">Edit Task</div>
            <form class="modal-form" id="editForm">
                <div class="form-group">
                    <label class="form-label" for="editTaskInput" data-en="Task Title" data-ar="عنوان المهمة">Task Title</label>
                    <input type="text" id="editTaskInput" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editPrioritySelect" data-en="Priority" data-ar="الأولوية">Priority</label>
                    <select id="editPrioritySelect" class="form-input">
                        <option value="low" data-en="Low" data-ar="منخفضة">Low</option>
                        <option value="medium" data-en="Medium" data-ar="عادية">Medium</option>
                        <option value="high" data-en="High" data-ar="عالية">High</option>
                    </select>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-modal btn-cancel" id="cancelBtn" data-en="Cancel" data-ar="إلغاء">Cancel</button>
                    <button type="submit" class="btn-modal btn-save" id="saveBtn" data-en="Save" data-ar="حفظ">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== APP STATE =====
        let tasks = [];
        let currentFilter = 'all';
        let currentLang = localStorage.getItem('maxora-task-lang') || 'en';
        let currentTheme = localStorage.getItem('maxora-task-theme') || 'dark';
        let editingTaskId = null;

        const TRANSLATIONS = {
            en: {
                'Add a new task...': 'Add a new task...',
                'Total Tasks': 'Total Tasks',
                'Completed': 'Completed',
                'Pending': 'Pending',
                'High Priority': 'High Priority',
                'Medium Priority': 'Medium Priority',
                'Low Priority': 'Low Priority',
                'All': 'All',
                'Completed': 'Completed',
                'Edit': 'Edit',
                'Delete': 'Delete',
                'No tasks yet. Add one to get started!': 'No tasks yet. Add one to get started!',
            },
            ar: {
                'Add a new task...': 'أضف مهمة جديدة...',
                'Total Tasks': 'إجمالي المهام',
                'Completed': 'مكتملة',
                'Pending': 'قيد الانتظار',
                'High Priority': 'أولوية عالية',
                'Medium Priority': 'أولوية عادية',
                'Low Priority': 'أولوية منخفضة',
                'All': 'الكل',
                'Edit': 'تعديل',
                'Delete': 'حذف',
                'No tasks yet. Add one to get started!': 'لا توجد مهام حتى الآن. أضف واحدة للبدء!',
            }
        };

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            applyTheme(currentTheme);
            applyLanguage(currentLang);
            renderTasks();
            setupEventListeners();
            updateStats();
        });

        // ===== EVENT LISTENERS =====
        function setupEventListeners() {
            document.getElementById('addBtn').addEventListener('click', addTask);
            document.getElementById('taskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTask();
            });

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('langToggle').addEventListener('click', toggleLanguage);

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.dataset.filter;
                    renderTasks();
                });
            });

            document.getElementById('cancelBtn').addEventListener('click', closeEditModal);
            document.getElementById('editForm').addEventListener('submit', saveEditedTask);
        }

        // ===== TASK MANAGEMENT =====
        function addTask() {
            const input = document.getElementById('taskInput');
            const priority = document.getElementById('prioritySelect').value;
            const text = input.value.trim();

            if (!text) {
                alert(currentLang === 'en' ? 'Please enter a task!' : 'الرجاء إدخال مهمة!');
                return;
            }

            const task = {
                id: Date.now(),
                text: text,
                priority: priority,
                completed: false,
                createdAt: new Date().toLocaleDateString(currentLang === 'ar' ? 'ar-EG' : 'en-US')
            };

            tasks.push(task);
            saveTasks();
            input.value = '';
            renderTasks();
            updateStats();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveTasks();
            renderTasks();
            updateStats();
        }

        function toggleTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks();
                renderTasks();
                updateStats();
            }
        }

        function openEditModal(id) {
            editingTaskId = id;
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('editTaskInput').value = task.text;
                document.getElementById('editPrioritySelect').value = task.priority;
                document.getElementById('editModal').classList.add('show');
            }
        }

        function closeEditModal() {
            editingTaskId = null;
            document.getElementById('editModal').classList.remove('show');
        }

        function saveEditedTask(e) {
            e.preventDefault();
            const task = tasks.find(t => t.id === editingTaskId);
            if (task) {
                task.text = document.getElementById('editTaskInput').value;
                task.priority = document.getElementById('editPrioritySelect').value;
                saveTasks();
                renderTasks();
                updateStats();
                closeEditModal();
            }
        }

        // ===== RENDER =====
        function renderTasks() {
            const container = document.getElementById('tasksContainer');

            let filtered = tasks;
            if (currentFilter === 'completed') {
                filtered = tasks.filter(t => t.completed);
            } else if (currentFilter === 'pending') {
                filtered = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'high') {
                filtered = tasks.filter(t => t.priority === 'high');
            }

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📋</div>
                        <div class="empty-text" data-en="No tasks yet. Add one to get started!" data-ar="لا توجد مهام حتى الآن. أضف واحدة للبدء!">
                            ${currentLang === 'en' ? 'No tasks yet. Add one to get started!' : 'لا توجد مهام حتى الآن. أضف واحدة للبدء!'}
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(task => `
                <div class="task-item ${task.completed ? 'completed' : ''} fade-in">
                    <input 
                        type="checkbox" 
                        class="checkbox" 
                        ${task.completed ? 'checked' : ''}
                        onchange="toggleTask(${task.id})"
                    >
                    <div class="task-content">
                        <div class="task-text">${task.text}</div>
                        <div class="task-meta">
                            <span class="priority-badge priority-${task.priority}">
                                ${getPriorityLabel(task.priority)}
                            </span>
                            <span class="task-date">${task.createdAt}</span>
                        </div>
                    </div>
                    <div class="task-actions">
                        <button class="btn-action" onclick="openEditModal(${task.id})" title="${currentLang === 'en' ? 'Edit' : 'تعديل'}">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-action btn-delete" onclick="deleteTask(${task.id})" title="${currentLang === 'en' ? 'Delete' : 'حذف'}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getPriorityLabel(priority) {
            const labels = {
                high: currentLang === 'en' ? '🔴 High' : '🔴 عالية',
                medium: currentLang === 'en' ? '🟡 Medium' : '🟡 عادية',
                low: currentLang === 'en' ? '🟢 Low' : '🟢 منخفضة'
            };
            return labels[priority];
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const pending = total - completed;
            const highPriority = tasks.filter(t => t.priority === 'high').length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('highPriorityTasks').textContent = highPriority;
        }

        // ===== STORAGE =====
        function saveTasks() {
            localStorage.setItem('maxora-tasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            const saved = localStorage.getItem('maxora-tasks');
            tasks = saved ? JSON.parse(saved) : [];
        }

        // ===== THEME =====
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('maxora-task-theme', currentTheme);
            applyTheme(currentTheme);
        }

        function applyTheme(theme) {
            const btn = document.getElementById('themeToggle');
            if (theme === 'light') {
                document.body.classList.add('light-mode');
                btn.textContent = '🌙';
            } else {
                document.body.classList.remove('light-mode');
                btn.textContent = '☀️';
            }
        }

        // ===== LANGUAGE =====
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('maxora-task-lang', currentLang);
            applyLanguage(currentLang);
        }

        function applyLanguage(lang) {
            const html = document.getElementById('htmlRoot');
            const langBtn = document.getElementById('langToggle');

            if (lang === 'ar') {
                html.lang = 'ar';
                html.dir = 'rtl';
                document.body.classList.add('lang-ar');
                langBtn.textContent = 'EN';
            } else {
                html.lang = 'en';
                html.dir = 'ltr';
                document.body.classList.remove('lang-ar');
                langBtn.textContent = 'ع';
            }

            // Update all data attributes
            document.querySelectorAll('[data-en][data-ar]').forEach(el => {
                el.textContent = lang === 'ar' ? el.dataset.ar : el.dataset.en;
            });

            // Update placeholders
            const input = document.getElementById('taskInput');
            input.placeholder = lang === 'ar' 
                ? input.dataset.placeholderAr 
                : input.dataset.placeholderEn;

            renderTasks();
        }
    </script>
</body>
</html>
